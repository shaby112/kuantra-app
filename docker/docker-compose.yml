version: '3.8'

services:
  kuantra:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        VITE_CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
    ports:
      - "${INSIGHTOPS_PORT:-8080}:8080"
    environment:
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - CLERK_PUBLISHABLE_KEY=${CLERK_PUBLISHABLE_KEY}
      - CLERK_ISSUER=${CLERK_ISSUER}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-gemini-2.0-flash}
      - AI_PROVIDER=${AI_PROVIDER:-gemini}
      - ALLOW_CLOUD_LLM=${ALLOW_CLOUD_LLM:-true}
      - LOCAL_LLM_BASE_URL=${LOCAL_LLM_BASE_URL:-}
      - LOCAL_LLM_MODEL=${LOCAL_LLM_MODEL:-local-model}
      - LOCAL_LLM_API_KEY=${LOCAL_LLM_API_KEY:-}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - DATABASE_URL=postgresql+asyncpg://kuantra:${DB_PASSWORD:-kuantra}@db:5432/kuantra
      - SQLALCHEMY_DATABASE_URI=postgresql://kuantra:${DB_PASSWORD:-kuantra}@db:5432/kuantra
      - DUCKDB_MEMORY_LIMIT=${DUCKDB_MEMORY_LIMIT:-4GB}
      - DUCKDB_THREADS=${DUCKDB_THREADS:-4}
      - ENVIRONMENT=production
      - DEBUG=false
      - CORS_ORIGINS=${CORS_ORIGINS:-}
      - UVICORN_WORKERS=${UVICORN_WORKERS:-1}
      - UVICORN_LOG_LEVEL=${UVICORN_LOG_LEVEL:-info}
      - RUN_MIGRATIONS_ON_START=${RUN_MIGRATIONS_ON_START:-true}
    

  logto:
    image: ghcr.io/logto-io/logto:latest
    container_name: logto
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3001:3001"
      - "3002:3002"
    environment:
      - TRUST_PROXY_HEADER=1
      - DB_URL=postgresql://logto:logto@db:5432/logto
      - ENDPOINT=http://localhost:3001
      - ADMIN_ENDPOINT=http://localhost:3002
    command: "npm start"
    restart: unless-stopped

volumes:
      - kuantra-data:/app/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=kuantra
      - POSTGRES_PASSWORD=${DB_PASSWORD:-kuantra}
      - POSTGRES_DB=kuantra
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-logto-db.sql:/docker-entrypoint-initdb.d/init-logto-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kuantra"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  kuantra-data:
  postgres-data:
